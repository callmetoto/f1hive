<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1Hive | Live Grid</title>
    <style>
        :root { --f1-red: #e10600; --glass: rgba(255, 255, 255, 0.08); }
        body { background: #0b0b0f; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }
        
        .header { text-align: center; margin-bottom: 30px; z-index: 10; }
        .header h1 { font-size: 3.5rem; font-weight: 900; font-style: italic; margin: 0; letter-spacing: -2px; }
        .header span { color: var(--f1-red); }
        .sub-msg { color: #888; letter-spacing: 1px; font-size: 0.9rem; margin-top: 5px; text-transform: uppercase; }

        .main-stage { display: flex; align-items: center; gap: 20px; width: 95%; justify-content: center; min-height: 400px; }

        /* Navigation Arrows */
        .nav-btn { background: var(--glass); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 50%; width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; font-size: 2rem; cursor: pointer; transition: 0.3s; color: white; z-index: 10; user-select: none; }
        .nav-btn:hover { background: var(--f1-red); transform: scale(1.1); box-shadow: 0 0 20px rgba(225, 6, 0, 0.4); }

        /* Glass Scorecards */
        .card-container { display: flex; gap: 20px; perspective: 1000px; flex-wrap: wrap; justify-content: center; }
        .glass-card { width: 250px; height: 320px; background: var(--glass); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-bottom: 5px solid var(--f1-red); border-radius: 24px; padding: 25px; display: flex; flex-direction: column; justify-content: space-between; box-shadow: 0 25px 45px rgba(0,0,0,0.5); transition: transform 0.1s ease-out; position: relative; }

        .label { font-size: 0.7rem; color: var(--f1-red); letter-spacing: 2px; font-weight: bold; text-transform: uppercase; }
        .name { font-size: 1.6rem; font-weight: 900; text-transform: uppercase; margin: 5px 0; line-height: 1; }
        .sub-text { font-size: 0.85rem; color: #aaa; }
        
        .points-box { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; text-align: center; }
        .pts-val { font-size: 2.2rem; font-weight: 900; display: block; }

        #status-msg { margin-top: 30px; font-style: italic; color: #444; font-size: 0.7rem; letter-spacing: 1px; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="header">
        <h1>F1<span>HIVE</span></h1>
        <p class="sub-msg">The Hive is coming soon.</p>
        <p id="view-title" style="color: #666; font-size: 0.8rem; letter-spacing: 3px; margin-top: 15px;">DRIVER STANDINGS</p>
    </div>

    <div class="main-stage">
        <div class="nav-btn" onclick="toggleMode()">&#8249;</div>
        <div id="grid" class="card-container"></div>
        <div class="nav-btn" onclick="toggleMode()">&#8250;</div>
    </div>

    <p id="status-msg">TELEMETRY: LOCAL SYNC ACTIVE</p>

    <script>
        let currentMode = 'drivers';
        
        // This data acts as your "Instant Load" so the site never looks broken
        const f1Data = {
            drivers: [
                { pos: 1, name: "Antonelli", team: "Mercedes", pts: 72 },
                { pos: 2, name: "Russell", team: "Mercedes", pts: 63 },
                { pos: 3, name: "Leclerc", team: "Ferrari", pts: 49 }
            ],
            constructors: [
                { pos: 1, name: "Mercedes", team: "German Grid", pts: 135 },
                { pos: 2, name: "Ferrari", team: "Italian Grid", pts: 90 },
                { pos: 3, name: "McLaren", team: "British Grid", pts: 46 }
            ]
        };

        function render() {
            const grid = document.getElementById('grid');
            const title = document.getElementById('view-title');
            grid.innerHTML = '';
            
            const list = f1Data[currentMode];
            title.innerText = currentMode === 'drivers' ? "2026 DRIVER CHAMPIONSHIP" : "2026 TEAM CHAMPIONSHIP";

            list.forEach(item => {
                const card = document.createElement('div');
                card.className = 'glass-card';
                
                card.innerHTML = `
                    <div>
                        <div class="label">POSITION P${item.pos}</div>
                        <div class="name">${item.name}</div>
                        <div class="sub-text">${item.team}</div>
                    </div>
                    <div class="points-box">
                        <span class="pts-val">${item.pts}</span>
                        <div class="label">SEASON POINTS</div>
                    </div>
                `;

                // Interactive Tilt
                card.onmousemove = (e) => {
                    const r = card.getBoundingClientRect();
                    const x = (e.clientX - r.left - r.width/2)/10;
                    const y = (e.clientY - r.top - r.height/2)/10;
                    card.style.transform = `rotateY(${x}deg) rotateX(${-y}deg) scale(1.05)`;
                };
                card.onmouseleave = () => card.style.transform = `rotate(0) scale(1)`;

                grid.appendChild(card);
            });
        }

        function toggleMode() {
            currentMode = currentMode === 'drivers' ? 'constructors' : 'drivers';
            render();
        }

        // Initialize immediately
        render();

        // Background Sync (Tries to fetch but won't break the page if it fails)
        async function backgroundSync() {
            try {
                const response = await fetch('https://openf1.org', { mode: 'no-cors' });
                document.getElementById('status-msg').innerText = "TELEMETRY: TRACK CONNECTED";
            } catch (e) {
                // If it fails, the local data is already showing, so the user sees no error!
            }
        }
        backgroundSync();
    </script>
</body>
</html>
