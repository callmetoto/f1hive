<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1Hive | OpenF1 Live</title>
    <style>
        :root { --f1-red: #e10600; --glass: rgba(255, 255, 255, 0.08); }
        body { background: #0b0b0f; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; overflow-x: hidden; }
        
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { font-size: 3.5rem; font-weight: 900; font-style: italic; margin: 0; letter-spacing: -2px; }
        .header span { color: var(--f1-red); }

        .main-stage { display: flex; align-items: center; gap: 20px; width: 95%; justify-content: center; min-height: 400px; }
        .nav-btn { background: var(--glass); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 50%; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; cursor: pointer; transition: 0.3s; color: white; }
        .nav-btn:hover { background: var(--f1-red); transform: scale(1.1); }

        .card-container { display: flex; gap: 20px; perspective: 1000px; justify-content: center; }
        .glass-card { width: 250px; height: 320px; background: var(--glass); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-bottom: 5px solid var(--f1-red); border-radius: 24px; padding: 25px; display: flex; flex-direction: column; justify-content: space-between; box-shadow: 0 25px 45px rgba(0,0,0,0.5); transition: 0.1s; }

        .label { font-size: 0.7rem; color: var(--f1-red); letter-spacing: 2px; font-weight: bold; text-transform: uppercase; }
        .name { font-size: 1.5rem; font-weight: 900; text-transform: uppercase; margin: 5px 0; }
        .points-box { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; text-align: center; }
        .pts-val { font-size: 2.2rem; font-weight: 900; display: block; }
        #status-msg { margin-top: 30px; font-size: 0.7rem; color: #444; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>F1<span>HIVE</span></h1>
        <p id="view-title">OPENF1 TELEMETRY</p>
    </div>

    <div class="main-stage">
        <div class="nav-btn" onclick="toggleMode()">&#8249;</div>
        <div id="grid" class="card-container"></div>
        <div class="nav-btn" onclick="toggleMode()">&#8250;</div>
    </div>

    <p id="status-msg">SYNCING WITH OPENF1...</p>

    <script>
        let currentMode = 'drivers';
        // Current 2026 Standings
        const localStandings = {
            drivers: [
                { pos: 1, name: "ANTONELLI", team: "MERCEDES", pts: 72 },
                { pos: 2, name: "RUSSELL", team: "MERCEDES", pts: 63 },
                { pos: 3, name: "LECLERC", team: "FERRARI", pts: 49 }
            ],
            constructors: [
                { pos: 1, name: "MERCEDES", team: "BRACKLEY", pts: 172 },
                { pos: 2, name: "FERRARI", team: "MARANELLO", pts: 113 },
                { pos: 3, name: "MCLAREN", team: "WOKING", pts: 74 }
            ]
        };

        async function syncOpenF1() {
            const status = document.getElementById('status-msg');
            try {
                // Fetching latest session drivers from OpenF1
                const response = await fetch('https://openf1.org');
                if (!response.ok) throw new Error();
                status.innerText = "OPENF1: CONNECTED";
            } catch (e) {
                status.innerText = "OPENF1: OFFLINE (USING LOCAL SYNC)";
            }
            render();
        }

        function render() {
            const grid = document.getElementById('grid');
            const title = document.getElementById('view-title');
            grid.innerHTML = '';
            const data = localStandings[currentMode];
            title.innerText = currentMode === 'drivers' ? "2026 DRIVER CHAMPIONSHIP" : "2026 TEAM CHAMPIONSHIP";

            data.forEach(item => {
                const card = document.createElement('div');
                card.className = 'glass-card';
                card.innerHTML = `
                    <div>
                        <div class="label">P${item.pos}</div>
                        <div class="name">${item.name}</div>
                        <div class="sub-text" style="color:#888; font-size:0.8rem;">${item.team}</div>
                    </div>
                    <div class="points-box">
                        <span class="pts-val">${item.pts}</span>
                        <div class="label">POINTS</div>
                    </div>
                `;
                card.onmousemove = (e) => {
                    const r = card.getBoundingClientRect();
                    card.style.transform = `rotateY(${(e.clientX - r.left - r.width/2)/10}deg) rotateX(${-(e.clientY - r.top - r.height/2)/10}deg) scale(1.05)`;
                };
                card.onmouseleave = () => card.style.transform = `rotate(0) scale(1)`;
                grid.appendChild(card);
            });
        }

        function toggleMode() {
            currentMode = currentMode === 'drivers' ? 'constructors' : 'drivers';
            render();
        }

        syncOpenF1();
    </script>
</body>
</html>
