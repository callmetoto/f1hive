<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1Hive | Lights Out Soon</title>
    <style>
        :root { --f1-red: #e10600; --glass: rgba(255, 255, 255, 0.08); }
        body { background: #0b0b0f; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; overflow-x: hidden; }
        
        /* Hero Section */
        .hero { text-align: center; margin-bottom: 40px; max-width: 700px; padding: 0 20px; z-index: 10; }
        .hero h1 { font-size: 4.5rem; font-weight: 900; font-style: italic; margin: 0; letter-spacing: -4px; line-height: 1; }
        .hero span { color: var(--f1-red); }
        .hero p { font-size: 1.2rem; color: #888; margin-top: 15px; letter-spacing: 1px; font-weight: 300; }
        
        .badge { display: inline-flex; align-items: center; gap: 8px; background: rgba(225, 6, 0, 0.1); border: 1px solid var(--f1-red); padding: 6px 18px; border-radius: 30px; color: var(--f1-red); font-size: 0.75rem; font-weight: 900; text-transform: uppercase; margin-bottom: 20px; letter-spacing: 2px; }
        .pulse { width: 8px; height: 8px; background: var(--f1-red); border-radius: 50%; animation: pulse 1.5s infinite; }

        @keyframes pulse { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.3; transform: scale(1.6); } 100% { opacity: 1; transform: scale(1); } }

        /* Navigation & Stage */
        .main-stage { display: flex; align-items: center; gap: 20px; width: 95%; justify-content: center; min-height: 380px; }
        .nav-btn { background: var(--glass); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 50%; width: 55px; height: 55px; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; cursor: pointer; transition: 0.3s; color: white; user-select: none; }
        .nav-btn:hover { background: var(--f1-red); transform: scale(1.1); box-shadow: 0 0 25px rgba(225, 6, 0, 0.5); }

        /* Interactive Cards */
        .card-container { display: flex; gap: 20px; perspective: 1000px; flex-wrap: wrap; justify-content: center; }
        .glass-card { width: 260px; height: 320px; background: var(--glass); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.1); border-bottom: 6px solid var(--f1-red); border-radius: 24px; padding: 25px; display: flex; flex-direction: column; justify-content: space-between; box-shadow: 0 30px 60px rgba(0,0,0,0.6); transition: transform 0.1s ease-out; }

        .label { font-size: 0.7rem; color: var(--f1-red); letter-spacing: 2px; font-weight: bold; text-transform: uppercase; }
        .name { font-size: 1.7rem; font-weight: 900; text-transform: uppercase; margin: 5px 0; line-height: 1; }
        .team-name { font-size: 0.85rem; color: #aaa; margin-top: 2px; }
        
        .pts-box { background: rgba(0,0,0,0.3); padding: 15px; border-radius: 15px; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
        .pts-val { font-size: 2.4rem; font-weight: 900; display: block; }
        
        #view-title { margin-top: 25px; font-size: 0.8rem; color: #444; letter-spacing: 5px; text-transform: uppercase; font-weight: bold; }
    </style>
</head>
<body>

    <div class="hero">
        <div class="badge"><div class="pulse"></div> Live Telemetry Active</div>
        <h1>F1<span>HIVE</span></h1>
        <p>The Hive is preparing for lights out. We're building the ultimate F1 hub—meanwhile, track the 2026 title fight below.</p>
    </div>

    <div class="main-stage">
        <div class="nav-btn" onclick="toggleMode()">&#8249;</div>
        <div id="grid" class="card-container"></div>
        <div class="nav-btn" onclick="toggleMode()">&#8250;</div>
    </div>

    <div id="view-title">DRIVER STANDINGS</div>

    <script>
        let currentMode = 'drivers';
        
        // Hardcoded 2026 Standings for Instant Load
        const standings = {
            drivers: [
                { pos: 1, name: "Antonelli", team: "Mercedes", pts: 72 },
                { pos: 2, name: "Russell", team: "Mercedes", pts: 63 },
                { pos: 3, name: "Leclerc", team: "Ferrari", pts: 49 }
            ],
            constructors: [
                { pos: 1, name: "Mercedes", team: "German Engineering", pts: 135 },
                { pos: 2, name: "Ferrari", team: "Italian Passion", pts: 90 },
                { pos: 3, name: "McLaren", team: "British Speed", pts: 46 }
            ]
        };

        function render() {
            const grid = document.getElementById('grid');
            const title = document.getElementById('view-title');
            grid.innerHTML = '';
            
            const list = standings[currentMode];
            title.innerText = currentMode === 'drivers' ? "2026 DRIVER CHAMPIONSHIP" : "2026 TEAM CHAMPIONSHIP";

            list.forEach(item => {
                const card = document.createElement('div');
                card.className = 'glass-card';
                card.innerHTML = `
                    <div>
                        <div class="label">POSITION P${item.pos}</div>
                        <div class="name">${item.name}</div>
                        <div class="team-name">${item.team}</div>
                    </div>
                    <div class="pts-box">
                        <span class="pts-val">${item.pts}</span>
                        <div class="label">SEASON PTS</div>
                    </div>
                `;

                card.onmousemove = (e) => {
                    const r = card.getBoundingClientRect();
                    const x = (e.clientX - r.left - r.width/2)/12;
                    const y = (e.clientY - r.top - r.height/2)/12;
                    card.style.transform = `rotateY(${x}deg) rotateX(${-y}deg) scale(1.05)`;
                };
                card.onmouseleave = () => card.style.transform = `rotate(0) scale(1)`;

                grid.appendChild(card);
            });
        }

        function toggleMode() {
            currentMode = currentMode === 'drivers' ? 'constructors' : 'drivers';
            render();
        }

        render();
    </script>
</body>
</html>
