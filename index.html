<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1Hive | Live Grid</title>
    <style>
        :root { --f1-red: #e10600; --glass: rgba(255, 255, 255, 0.08); }
        body { background: #0b0b0f; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }
        
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { font-size: 3.5rem; font-weight: 900; font-style: italic; margin: 0; letter-spacing: -2px; }
        .header span { color: var(--f1-red); }

        .main-stage { display: flex; align-items: center; gap: 30px; width: 95%; justify-content: center; min-height: 400px; }

        .nav-btn { background: var(--glass); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 50%; width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; font-size: 2rem; cursor: pointer; transition: 0.3s; color: white; }
        .nav-btn:hover { background: var(--f1-red); transform: scale(1.1); box-shadow: 0 0 20px rgba(225, 6, 0, 0.4); }

        .card-container { display: flex; gap: 20px; perspective: 1000px; }
        .glass-card { width: 260px; height: 340px; background: var(--glass); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-bottom: 5px solid var(--f1-red); border-radius: 24px; padding: 25px; display: flex; flex-direction: column; justify-content: space-between; box-shadow: 0 25px 45px rgba(0,0,0,0.5); transition: transform 0.1s ease-out; }

        .label { font-size: 0.7rem; color: var(--f1-red); letter-spacing: 2px; font-weight: bold; text-transform: uppercase; }
        .name { font-size: 1.6rem; font-weight: 900; text-transform: uppercase; margin: 5px 0; line-height: 1; }
        .sub-text { font-size: 0.85rem; color: #aaa; }
        
        .points-box { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; text-align: center; }
        .pts-val { font-size: 2.2rem; font-weight: 900; display: block; }

        #status-msg { margin-top: 30px; font-style: italic; color: #444; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div class="header">
        <h1>F1<span>HIVE</span></h1>
        <p id="view-title">2026 WORLD CHAMPIONSHIP</p>
    </div>

    <div class="main-stage">
        <div class="nav-btn" onclick="toggleMode()">&#8249;</div>
        <div id="grid" class="card-container"></div>
        <div class="nav-btn" onclick="toggleMode()">&#8250;</div>
    </div>

    <p id="status-msg">SYNCING TELEMETRY...</p>

    <script>
        let currentMode = 'drivers';
        let store = { drivers: [], constructors: [] };

        async function init() {
            try {
                // FETCH REAL DATA
                const [dRes, cRes] = await Promise.all([
                    fetch('https://jolpi.ca'),
                    fetch('https://jolpi.ca')
                ]);

                const dData = await dRes.json();
                const cData = await cRes.json();

                store.drivers = dData.MRData.StandingsTable.StandingsLists[0].DriverStandings;
                store.constructors = cData.MRData.StandingsTable.StandingsLists[0].ConstructorStandings;

                document.getElementById('status-msg').innerText = "LIVE TELEMETRY: CONNECTED";
                render();
            } catch (e) {
                document.getElementById('status-msg').innerText = "CONNECTION ERROR: CHECK BACK SOON";
                console.error(e);
            }
        }

        function render() {
            const grid = document.getElementById('grid');
            const title = document.getElementById('view-title');
            grid.innerHTML = '';
            
            const list = currentMode === 'drivers' ? store.drivers : store.constructors;
            title.innerText = currentMode === 'drivers' ? "DRIVER STANDINGS" : "CONSTRUCTOR STANDINGS";

            list.slice(0, 3).forEach(item => {
                const card = document.createElement('div');
                card.className = 'glass-card';
                
                const name = currentMode === 'drivers' ? item.Driver.familyName : item.Constructor.name;
                const team = currentMode === 'drivers' ? item.Constructors[0].name : "Championship Points";

                card.innerHTML = `
                    <div>
                        <div class="label">P${item.position}</div>
                        <div class="name">${name}</div>
                        <div class="sub-text">${team}</div>
                    </div>
                    <div class="points-box">
                        <span class="pts-val">${item.points}</span>
                        <div class="label">POINTS</div>
                    </div>
                `;

                card.onmousemove = (e) => {
                    const r = card.getBoundingClientRect();
                    card.style.transform = `rotateY(${(e.clientX - r.left - r.width/2)/10}deg) rotateX(${-(e.clientY - r.top - r.height/2)/10}deg) scale(1.05)`;
                };
                card.onmouseleave = () => card.style.transform = `rotate(0) scale(1)`;

                grid.appendChild(card);
            });
        }

        function toggleMode() {
            currentMode = currentMode === 'drivers' ? 'constructors' : 'drivers';
            render();
        }

        init();
    </script>
</body>
</html>
